<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danial Zivehdar - Trading Chart</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0d1117;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
            color: #58a6ff;
        }
        .chart-box {
            width: 100%;
            height: 650px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #30363d;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        iframe { width: 100%; height: 100%; border: none; }
        .footer {
            text-align: center;
            margin-top: 15px;
            color: #8b949e;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Live Trading Chart</h2>
        </div>
        <div class="chart-box">
            <iframe
                id="dextools-widget"
                title="DEXTools Trading Chart"
                src="https://www.dextools.io/widget-chart/en/ether/pe-light/0xa29fe6ef9592b5d408cca961d0fb9b1faf497d6d?theme=dark&chartType=1&chartResolution=60&drawingToolbars=true&showTradeHistory=true&tvPlatformColor=0d1117&tvPaneColor=161b22&headerColor=58a6ff">
            </iframe>
        </div>
        <div class="footer">
            &copy; 2026 Danial Zivehdar | All Rights Reserved
        </div>
    </div>
</body>
</html>
